name = "sphinx-bot"
main = "build/worker/shim.mjs"
compatibility_date = "2024-04-24"

[build]
command = "cargo install worker-build && worker-build --release"

[[kv_namespaces]]
binding = "WAIT_AUTH_KV"
id = "fad766e0ebce4439974d64c5e1cc6b5b"

[vars]
BOT_USERNAME = "wit_sphinx_bot"


[[durable_objects.bindings]]
name = "USER_WATCH_DO"
class_name = "UserWatchDO"

[[durable_objects.bindings]]
name = "AUTH_HUB"
class_name = "AuthHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserWatchDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AuthHub"]


[observability]
logs = { enabled = false, invocation_logs = false }
